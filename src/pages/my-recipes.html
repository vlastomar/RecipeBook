<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Recipes - ReceiptBook</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div data-navbar></div>

    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">My Recipes</h1>
        <a class="btn btn-primary" href="add-recipe.html">Add Recipe</a>
      </div>

      <div id="messageContainer" class="mb-3" aria-live="polite"></div>
      <div id="loadingState" class="text-center py-4" hidden>
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      <div id="recipesList" class="row g-4"></div>

      <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="deleteModalLabel">Delete Recipe</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <p>Are you sure you want to delete this recipe?</p>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="button" class="btn btn-danger" id="confirmDeleteButton">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-footer></div>

    <script type="module">
      import 'bootstrap/dist/css/bootstrap.min.css';
      import 'bootstrap-icons/font/bootstrap-icons.css';
      import { renderNavbar } from '../assets/js/components/navbar.js';
      import { renderFooter } from '../assets/js/components/footer.js';
      import '../assets/js/pages/my-recipes.js';

      renderNavbar('profile');
      renderFooter();
    </script>
  </body>
</html>
