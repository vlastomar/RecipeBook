<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ReceiptBook</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div data-navbar></div>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="card-title mb-4">Login</h2>
              <div data-alerts></div>
              <form>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" />
                </div>
                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" />
                </div>
                <button class="btn btn-primary w-100" type="button">Sign In</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-footer></div>

    <script type="module">
      import 'bootstrap/dist/css/bootstrap.min.css';
      import { renderNavbar } from '../assets/js/components/navbar.js';
      import { renderFooter } from '../assets/js/components/footer.js';
      import { showAlert } from '../assets/js/components/alerts.js';

      renderNavbar('login');
      renderFooter();
      showAlert('This is a starter page. Connect Supabase later.', 'info');
    </script>
  </body>
</html>
