<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - ReceiptBook</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div data-navbar></div>

    <main class="container py-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="card-title mb-4">Profile</h1>
          <div id="messageContainer" class="mb-3" aria-live="polite"></div>
          <div id="loadingState" class="text-muted">Loading profile...</div>
          <form id="profileForm" class="d-none" novalidate>
            <div class="row g-4 align-items-start">
              <div class="col-lg-4 text-center">
                <div class="position-relative d-inline-block">
                  <img id="avatarPreview" class="rounded-circle border img-fluid d-none" alt="Current avatar" style="width: 180px; height: 180px; object-fit: cover;" />
                  <div id="avatarFallback" class="rounded-circle border d-flex align-items-center justify-content-center bg-light text-secondary fw-bold d-none" style="width: 180px; height: 180px; font-size: 3rem;"></div>
                </div>
                <div class="mt-3">
                  <label for="avatarInput" class="form-label">Upload avatar</label>
                  <input id="avatarInput" class="form-control" type="file" accept="image/jpeg,image/png,image/webp" />
                  <div class="form-text">JPEG, PNG, or WebP up to 5 MB.</div>
                </div>
                <div class="form-check mt-3">
                  <input id="removeAvatar" class="form-check-input" type="checkbox" />
                  <label for="removeAvatar" class="form-check-label">Remove current avatar</label>
                </div>
              </div>
              <div class="col-lg-8">
                <div class="mb-3">
                  <label for="displayName" class="form-label">Display Name</label>
                  <input id="displayName" name="displayName" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input id="email" name="email" class="form-control" readonly />
                </div>
                <div class="mb-3">
                  <label for="bio" class="form-label">Bio</label>
                  <textarea id="bio" name="bio" class="form-control" rows="5"></textarea>
                </div>
                <div class="d-flex justify-content-end">
                  <button id="saveButton" class="btn btn-primary" type="submit">Save Changes</button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>

    <div data-footer></div>

    <script type="module">
      import 'bootstrap/dist/css/bootstrap.min.css';
      import { renderNavbar } from '../assets/js/components/navbar.js';
      import { renderFooter } from '../assets/js/components/footer.js';
      import '../assets/js/pages/profile.js';

      renderNavbar('profile');
      renderFooter();
    </script>
  </body>
</html>
