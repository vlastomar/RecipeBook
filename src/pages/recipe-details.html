<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Details - ReceiptBook</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <div data-navbar></div>

    <main class="container py-5">
      <div id="statusMessage" class="mb-3" aria-live="polite"></div>
      <div id="loadingState" class="text-center py-4" hidden>
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      <div id="recipeContent" hidden></div>
    </main>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5">Delete recipe</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="mb-0">Are you sure you want to delete this recipe? This action cannot be undone.</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button id="confirmDeleteButton" type="button" class="btn btn-danger">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div data-footer></div>

    <script type="module">
      import 'bootstrap/dist/css/bootstrap.min.css';
      import 'bootstrap-icons/font/bootstrap-icons.css';
      import { renderNavbar } from '../assets/js/components/navbar.js';
      import { renderFooter } from '../assets/js/components/footer.js';
      import '../assets/js/pages/recipe-details.js';

      renderNavbar('recipes');
      renderFooter();
    </script>
  </body>
</html>
